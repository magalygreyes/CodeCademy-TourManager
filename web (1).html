<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Manager AI · BreezeOps (live)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:#0F766E; --teal-deep:#0B5A54; --navy:#1E293B; --white:#F8FAF8;
    --sage:#8FAF9B; --amber:#D9A441; --ink:#1E293B; --muted:#5B6B6A; --line:#DDE5E2;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--white); color:var(--ink); line-height:1.6; }
  h1,h2,h3 { font-family:'Space Grotesk',sans-serif; }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-grid { display:grid; grid-template-columns:repeat(3,6px); grid-template-rows:repeat(3,6px); gap:4px; }
  .logo-grid span { width:6px; height:6px; border-radius:50%; background:var(--teal); }
  .logo-grid span:nth-child(1){opacity:1}.logo-grid span:nth-child(2){opacity:.85}.logo-grid span:nth-child(3){opacity:.55}
  .logo-grid span:nth-child(4){opacity:.9}.logo-grid span:nth-child(5){opacity:.7}.logo-grid span:nth-child(6){opacity:.4}
  .logo-grid span:nth-child(7){opacity:.7}.logo-grid span:nth-child(8){opacity:.5}.logo-grid span:nth-child(9){opacity:.25}
  .logo-word { font-family:'Space Grotesk'; font-weight:700; letter-spacing:-0.02em; font-size:1.05rem; }
  .logo-word span { color:var(--teal); }
  nav { position:sticky; top:0; z-index:50; background:rgba(248,250,248,0.9); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  .live-tag { font-size:0.78rem; color:#fff; background:var(--teal); border-radius:999px; padding:4px 12px; font-weight:600; }
  .wrap { max-width:760px; margin:0 auto; padding:36px 24px; }
  .intro { text-align:center; margin-bottom:24px; }
  .intro h1 { font-size:2rem; color:var(--navy); letter-spacing:-0.02em; margin-bottom:8px; }
  .intro p { color:var(--muted); }
  .chat-card { background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden;
    box-shadow:0 24px 60px -30px rgba(15,118,110,0.35); }
  .chat-head { background:var(--navy); color:#fff; padding:14px 18px; display:flex; align-items:center; gap:10px; }
  .chat-head .dot { width:8px; height:8px; border-radius:50%; background:var(--sage); }
  .chat-head .title { font-family:'Space Grotesk'; font-weight:600; font-size:0.95rem; }
  .chat-head .live { margin-left:auto; font-size:0.7rem; color:var(--sage); letter-spacing:0.06em; }
  .chat-body { padding:18px; height:420px; overflow-y:auto; background:#FBFCFB; }
  .msg { margin-bottom:14px; display:flex; flex-direction:column; max-width:88%; }
  .msg.you { margin-left:auto; align-items:flex-end; }
  .msg.bot { margin-right:auto; align-items:flex-start; }
  .bubble { padding:10px 14px; border-radius:14px; font-size:0.9rem; line-height:1.5; white-space:pre-wrap; }
  .you .bubble { background:var(--teal); color:#fff; border-bottom-right-radius:4px; }
  .bot .bubble { background:#fff; border:1px solid var(--line); color:var(--navy); border-bottom-left-radius:4px; }
  .tool-trace { font-family:'Space Grotesk'; font-size:0.74rem; color:var(--teal);
    background:rgba(15,118,110,0.07); border:1px dashed rgba(15,118,110,0.3); border-radius:8px;
    padding:6px 10px; margin-bottom:6px; display:inline-flex; align-items:center; gap:6px; }
  .tool-trace::before { content:"⚙"; }
  .typing { font-size:0.8rem; color:var(--muted); padding:4px 0; font-style:italic; }
  .chat-foot { border-top:1px solid var(--line); padding:12px; display:flex; gap:8px; background:#fff; }
  .chat-foot input { flex:1; border:1px solid var(--line); border-radius:10px; padding:11px 14px; font-family:'Inter'; font-size:0.9rem; outline:none; }
  .chat-foot input:focus { border-color:var(--teal); }
  .send-btn { background:var(--teal); color:#fff; border:none; border-radius:10px; padding:0 18px; font-family:'Space Grotesk'; font-weight:600; cursor:pointer; }
  .send-btn:hover { background:var(--teal-deep); }
  .send-btn:disabled { opacity:0.5; cursor:default; }
  @media (max-width:600px){ .chat-body{height:380px} }
</style>
</head>
<body>
<nav>
  <div class="logo">
    <div class="logo-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="logo-word">Breeze<span>Ops</span></div>
  </div>
  <span class="live-tag">● LIVE</span>
</nav>

<div class="wrap">
  <div class="intro">
    <h1>Tour Manager AI</h1>
    <p>The real agent, running live. Ask about weather or currency.</p>
  </div>

  <div class="chat-card">
    <div class="chat-head">
      <span class="dot"></span><span class="title">Tour Manager</span><span class="live">LIVE AGENT</span>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="msg bot"><div class="bubble">Hi, I'm your tour manager assistant. Ask me anything about weather or currency on the run.</div></div>
    </div>
    <div class="chat-foot">
      <input id="chatInput" placeholder="Ask about weather or currency..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script>
  const body = document.getElementById('chatBody');
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  // server holds the conversation now

  function esc(s){ return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function addMsg(who, text){
    const m = document.createElement('div');
    m.className = 'msg ' + who;
    m.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
    body.appendChild(m); body.scrollTop = body.scrollHeight;
  }
  function addTrace(text){
    const t = document.createElement('div');
    t.className = 'msg bot';
    t.innerHTML = '<div class="tool-trace">Claude is using ' + esc(text) + '</div>';
    body.appendChild(t); body.scrollTop = body.scrollHeight;
  }

  async function sendMsg(){
    const q = input.value.trim();
    if (!q) return;
    addMsg('you', q);
    input.value = '';
    btn.disabled = true;

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typing';
    typing.textContent = 'Tour Manager is thinking...';
    body.appendChild(typing); body.scrollTop = body.scrollHeight;

    try {
      const res = await fetch('/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: q })
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      (data.traces || []).forEach(addTrace);
      addMsg('bot', data.answer || 'Sorry, something went wrong.');
    } catch (e) {
      document.getElementById('typing')?.remove();
      addMsg('bot', 'Could not reach the agent. Make sure the server is running.');
    }
    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
